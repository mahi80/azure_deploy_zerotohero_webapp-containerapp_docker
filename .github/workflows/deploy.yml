# CI/CD Pipeline: GitHub Push -> Build -> Test -> Push to ACR -> Deploy
#
# Triggers:
#   - Push to 'main'    -> deploy to production
#   - Pull Request       -> build + test only (no deploy)
#
# Required GitHub Secrets:
#   AZURE_CREDENTIALS, ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD,
#   AZURE_WEBAPP_NAME, AZURE_RESOURCE_GROUP, SECRET_KEY,
#   POSTGRES_PASSWORD, POSTGRES_USER, DB_HOST, ADMIN_PASSWORD, ADMIN_EMAIL

name: "CI/CD - Build, Test, Deploy"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: cc-underwriting-api
  PYTHON_VER: "3.11"

jobs:

  # JOB 1: Lint and Test
  test:
    name: "Lint and Test"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cc_test
          POSTGRES_USER: ccapi
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ccapi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://ccapi:test_pass@localhost:5432/cc_test"
      SECRET_KEY: "test-secret-key-not-for-production-at-all"
      MODEL_PATH: "models/cc_model_v1.joblib"
      ADMIN_PASSWORD: "TestAdmin@123"
      ADMIN_EMAIL: "admin@test.local"

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: pip

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: "Lint with ruff (non-blocking)"
        run: |
          pip install ruff
          ruff check app/ --exit-zero

      - name: "Check model artifact exists"
        run: |
          if [ ! -f "models/cc_model_v1.joblib" ]; then
            echo "Model file missing: models/cc_model_v1.joblib"
            echo "Run: python ml/train.py to generate it"
            exit 1
          fi
          echo "Model artifact found"
          ls -lh models/

      - name: "Run tests"
        run: |
          python -m pytest tests/ -v --tb=short -x

  # JOB 2: Build Docker image and push to ACR
  build-and-push:
    name: "Build and Push to ACR"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set image tag"
        id: meta
        run: |
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9]/-/g')
          SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TAG="${BRANCH}-${SHA}"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: "Login to ACR"
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Build and push Docker image"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: "Image pushed successfully"
        run: |
          echo "Image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}"

  # JOB 3: Deploy to Azure Web App
  deploy-webapp:
    name: "Deploy to Azure Web App"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: "Login to Azure"
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "Configure App Service settings"
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              {"name": "DOCKER_REGISTRY_SERVER_URL",      "value": "https://${{ secrets.ACR_LOGIN_SERVER }}"},
              {"name": "DOCKER_REGISTRY_SERVER_USERNAME",  "value": "${{ secrets.ACR_USERNAME }}"},
              {"name": "DOCKER_REGISTRY_SERVER_PASSWORD",  "value": "${{ secrets.ACR_PASSWORD }}"},
              {"name": "WEBSITES_PORT",                    "value": "8000"},
              {"name": "DATABASE_URL",                     "value": "postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@${{ secrets.DB_HOST }}:5432/cc_underwriting?sslmode=require"},
              {"name": "SECRET_KEY",                       "value": "${{ secrets.SECRET_KEY }}"},
              {"name": "MODEL_PATH",                       "value": "models/cc_model_v1.joblib"},
              {"name": "ADMIN_PASSWORD",                   "value": "${{ secrets.ADMIN_PASSWORD }}"},
              {"name": "ADMIN_EMAIL",                      "value": "${{ secrets.ADMIN_EMAIL }}"},
              {"name": "DEBUG",                            "value": "false"}
            ]

      - name: "Deploy container to Web App"
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"

      - name: "Wait for App Service to start"
        run: sleep 30

      - name: "Smoke test - health endpoint"
        run: |
          URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
          echo "Testing: $URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "Attempt $i - HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: "Azure logout"
        if: always()
        run: az logout
